name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run manifest scan
        run: PYTHONPATH=src python -m agenttrust scan agenttrust.example.yaml -o reports/ci-trust-report.md
